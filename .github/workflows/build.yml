name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Обновили до v4
      
      - uses: actions/setup-java@v4 # Обновили до v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - run: flutter pub get
      - run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4 # ИСПРАВЛЕННАЯ СТРОКА (v4)
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk